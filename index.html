
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Google Sans', 'Segoe UI', sans-serif; }
  #app { min-height: 600px; }

  /* AUTH */
  #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; min-height: 600px; }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .auth-logo svg { width: 40px; height: 40px; }
  .auth-logo span { font-size: 26px; font-weight: 400; color: var(--color-text-secondary); }
  .auth-logo span b { color: var(--color-text-primary); font-weight: 500; }
  .auth-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 32px; width: 100%; max-width: 400px; }
  .auth-card h2 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .auth-card p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #4285f4; box-shadow: 0 0 0 3px rgba(66,133,244,0.15); }
  .btn-primary { width: 100%; padding: 10px; background: #4285f4; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #3367d6; }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--color-text-secondary); }
  .auth-switch a { color: #4285f4; cursor: pointer; text-decoration: none; }
  .auth-error { background: var(--color-background-danger); color: var(--color-text-danger); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 13px; margin-bottom: 16px; }

  /* TOP BAR */
  #topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  .topbar-logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 400; color: var(--color-text-secondary); text-decoration: none; }
  .topbar-logo svg { width: 28px; height: 28px; }
  .topbar-spacer { flex: 1; }
  .topbar-user { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--color-text-secondary); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #4285f4; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-icon { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 50%; color: var(--color-text-secondary); font-size: 18px; }
  .btn-icon:hover { background: var(--color-background-secondary); }
  .admin-badge { background: #fbbc04; color: #202124; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }

  /* HOME */
  #home-screen { padding: 0 0 40px; }
  .home-recent { max-width: 800px; margin: 0 auto; padding: 24px 16px 0; }
  .home-recent h3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .new-doc-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; width: 140px; }
  .new-doc-thumb { width: 140px; height: 180px; border: 2px dashed var(--color-border-secondary); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--color-text-secondary); background: var(--color-background-secondary); }
  .new-doc-btn:hover .new-doc-thumb { border-color: #4285f4; color: #4285f4; background: #e8f0fe; }
  .new-doc-btn span { font-size: 13px; color: var(--color-text-secondary); }
  .docs-grid { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
  .doc-card { width: 140px; cursor: pointer; }
  .doc-thumb { width: 140px; height: 180px; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; background: var(--color-background-primary); padding: 12px; overflow: hidden; font-size: 9px; color: var(--color-text-secondary); line-height: 1.6; position: relative; }
  .doc-thumb:hover { border-color: #4285f4; box-shadow: 0 2px 8px rgba(66,133,244,0.2); }
  .doc-card-label { margin-top: 8px; font-size: 13px; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .doc-card-date { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .doc-owner-badge { font-size: 10px; color: var(--color-text-secondary); }
  .empty-docs { color: var(--color-text-secondary); font-size: 14px; padding: 20px 0; }

  /* EDITOR */
  #editor-screen { display: none; }
  .editor-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); flex-wrap: wrap; }
  .editor-bar select, .editor-bar input[type=number] { padding: 4px 8px; border: none; background: none; font-size: 13px; color: var(--color-text-primary); cursor: pointer; }
  .editor-bar select:hover, .editor-bar input[type=number]:hover { background: var(--color-background-secondary); border-radius: 4px; }
  .bar-sep { width: 0.5px; height: 20px; background: var(--color-border-tertiary); margin: 0 4px; }
  .bar-btn { background: none; border: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; color: var(--color-text-secondary); font-size: 14px; font-weight: bold; }
  .bar-btn:hover { background: var(--color-background-secondary); }
  .bar-btn.active { background: #e8f0fe; color: #4285f4; }
  .doc-title-input { font-size: 18px; font-weight: 400; border: none; background: none; color: var(--color-text-primary); padding: 0; min-width: 200px; flex: 1; }
  .doc-title-input:focus { outline: none; }
  .editor-page-wrap { background: var(--color-background-tertiary); min-height: 500px; padding: 20px; display: flex; justify-content: center; }
  .editor-page { width: 680px; min-height: 500px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 2px; padding: 48px 64px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .editor-content { min-height: 400px; font-size: 14px; line-height: 1.8; color: var(--color-text-primary); outline: none; }
  .save-status { font-size: 12px; color: var(--color-text-secondary); }
  .btn-back { background: none; border: none; cursor: pointer; font-size: 13px; color: #4285f4; padding: 6px 10px; border-radius: var(--border-radius-md); }
  .btn-back:hover { background: #e8f0fe; }

  /* ADMIN */
  #admin-screen { padding: 24px 16px; max-width: 900px; margin: 0 auto; }
  .admin-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .admin-header h2 { font-size: 20px; font-weight: 500; }
  .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .user-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
  .user-table td { padding: 10px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: middle; }
  .user-table tr:hover td { background: var(--color-background-secondary); }
  .status-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.active { background: #34a853; }
  .dot.offline { background: #9aa0a6; }
  .action-btns { display: flex; gap: 6px; }
  .btn-sm { font-size: 12px; padding: 4px 10px; border-radius: 4px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: none; color: var(--color-text-primary); }
  .btn-sm:hover { background: var(--color-background-secondary); }
  .btn-sm.danger { color: #d93025; border-color: #f4b5b2; }
  .btn-sm.danger:hover { background: var(--color-background-danger); }
  .btn-sm.primary { color: #4285f4; border-color: #a8c7fa; }
  .btn-sm.primary:hover { background: #e8f0fe; }
  .pw-cell { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); }

  /* MODAL */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 28px; width: 480px; max-width: 95vw; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn-cancel { background: none; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-primary); padding: 8px 16px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; }
  .btn-cancel:hover { background: var(--color-background-secondary); }
  .btn-confirm { background: #4285f4; color: #fff; border: none; padding: 8px 16px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; }
  .btn-confirm:hover { background: #3367d6; }
  .btn-confirm.danger { background: #d93025; }
  .btn-confirm.danger:hover { background: #c5221f; }
  .doc-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 14px; }
  .doc-list-item:last-child { border-bottom: none; }

  .tabs { display: flex; gap: 2px; margin-bottom: 0; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--color-text-secondary); background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: #4285f4; border-bottom-color: #4285f4; font-weight: 500; }
  .tab:hover:not(.active) { background: var(--color-background-secondary); }
  .no-data { color: var(--color-text-secondary); font-size: 14px; padding: 20px 0; text-align: center; }

  .topbar-nav { display: flex; gap: 4px; }
  .topbar-nav button { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); padding: 6px 12px; border-radius: var(--border-radius-md); }
  .topbar-nav button:hover { background: var(--color-background-secondary); }
  .topbar-nav button.active { color: #4285f4; background: #e8f0fe; }
</style>

<div id="app">
  <div id="auth-screen"></div>
  <div id="main-screen" style="display:none;">
    <div id="topbar">
      <div class="topbar-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="4" width="20" height="26" rx="2" fill="#4285f4"/>
          <rect x="6" y="4" width="20" height="26" rx="2" fill="url(#doc-g)"/>
          <path d="M6 4h14l6 6v20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="#4285f4"/>
          <path d="M20 4l6 6h-6V4z" fill="#1557b0"/>
          <rect x="10" y="14" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
          <rect x="10" y="18" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
          <rect x="10" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
          <defs><linearGradient id="doc-g" x1="6" y1="4" x2="26" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#5a95f5"/><stop offset="1" stop-color="#2b6fe8"/></linearGradient></defs>
        </svg>
        <span><b>Docs</b></span>
      </div>
      <div class="topbar-nav" id="topbar-nav"></div>
      <div class="topbar-spacer"></div>
      <div class="topbar-user">
        <span id="topbar-email" style="font-size:13px;"></span>
        <div class="avatar" id="topbar-avatar" title="Sign out" onclick="signOut()"></div>
      </div>
    </div>
    <div id="home-screen">
      <div class="home-recent">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
          <div class="new-doc-btn" onclick="newDoc()">
            <div class="new-doc-thumb"><i class="ti ti-plus" style="font-size:36px;" aria-hidden="true"></i></div>
            <span>Blank document</span>
          </div>
        </div>
        <h3>Recent documents</h3>
        <div class="docs-grid" id="docs-grid"></div>
      </div>
    </div>
    <div id="editor-screen">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);">
        <button class="btn-back" onclick="backHome()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Docs</button>
        <input class="doc-title-input" id="doc-title" type="text" placeholder="Untitled document" oninput="scheduleDocSave()">
        <span class="save-status" id="save-status">All changes saved</span>
      </div>
      <div class="editor-bar" id="editor-bar">
        <select id="fmt-font" onchange="execCmd('fontName',this.value)" style="width:110px;">
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Verdana">Verdana</option>
        </select>
        <div class="bar-sep" aria-hidden="true"></div>
        <input type="number" id="fmt-size" value="11" min="6" max="72" style="width:48px;" onchange="execCmd('fontSize',sizeToIndex(+this.value))">
        <div class="bar-sep" aria-hidden="true"></div>
        <button class="bar-btn" onclick="toggleFmt('bold')" title="Bold" id="btn-bold"><b>B</b></button>
        <button class="bar-btn" onclick="toggleFmt('italic')" title="Italic" id="btn-italic"><i style="font-style:italic;">I</i></button>
        <button class="bar-btn" onclick="toggleFmt('underline')" title="Underline" id="btn-underline"><u>U</u></button>
        <div class="bar-sep" aria-hidden="true"></div>
        <button class="bar-btn" onclick="execCmd('justifyLeft')" title="Align left"><i class="ti ti-align-left" aria-hidden="true"></i></button>
        <button class="bar-btn" onclick="execCmd('justifyCenter')" title="Center"><i class="ti ti-align-center" aria-hidden="true"></i></button>
        <button class="bar-btn" onclick="execCmd('justifyRight')" title="Align right"><i class="ti ti-align-right" aria-hidden="true"></i></button>
        <div class="bar-sep" aria-hidden="true"></div>
        <button class="bar-btn" onclick="execCmd('insertUnorderedList')" title="Bullet list"><i class="ti ti-list" aria-hidden="true"></i></button>
        <button class="bar-btn" onclick="execCmd('insertOrderedList')" title="Numbered list"><i class="ti ti-list-numbers" aria-hidden="true"></i></button>
        <div class="bar-sep" aria-hidden="true"></div>
        <input type="color" id="txt-color" title="Text color" style="width:28px;height:28px;border:none;padding:0;cursor:pointer;border-radius:4px;" onchange="execCmd('foreColor',this.value)">

      <div class="editor-page-wrap">

    <div id="admin-screen" style="display:none;">
      <div class="admin-header">
        <span style="font-size:22px;"><i class="ti ti-shield-lock" aria-hidden="true"></i></span>
        <h2>Admin panel</h2>
        <span class="admin-badge">Owner</span>

  </div>
  <div id="modal-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/uuid@9.0.0/dist/umd/uuidv4.min.js"></script>
<script>
const ADMIN_EMAIL = 'admin@gmail.com';
let currentUser = null;
let currentDocId = null;
let saveTimer = null;
let activeTab = 'home';

function getUsers() {
  try { return JSON.parse(localStorage.getItem('gdocs_users') || '[]'); } catch { return []; }
}
function saveUsers(u) { localStorage.setItem('gdocs_users', JSON.stringify(u)); }
function getDocs() {
  try { return JSON.parse(localStorage.getItem('gdocs_docs') || '[]'); } catch { return []; }
}
function saveDocs(d) { localStorage.setItem('gdocs_docs', JSON.stringify(d)); }
function getSessions() {
  try { return JSON.parse(localStorage.getItem('gdocs_sessions') || '{}'); } catch { return {}; }
}
function saveSessions(s) { localStorage.setItem('gdocs_sessions', JSON.stringify(s)); }
function getMyIP() { return localStorage.getItem('myIP') || generateFakeIP(); }
function generateFakeIP() {
  const ip = `${r(1,223)}.${r(0,255)}.${r(0,255)}.${r(1,254)}`;
  localStorage.setItem('myIP', ip);
  return ip;
}
function r(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

function init() {
  const sess = getSessions();
  const saved = Object.entries(sess).find(([k,v]) => v && v.active);
  if (saved) {
    const users = getUsers();
    const user = users.find(u => u.email === saved[0]);
    if (user) { currentUser = user; showMain(); return; }
  }
  showAuth('signin');
}

function showAuth(mode) {
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('main-screen').style.display = 'none';
  const s = document.getElementById('auth-screen');
  if (mode === 'signin') {
    s.innerHTML = `
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4h14l6 6v20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="#4285f4"/><path d="M20 4l6 6h-6V4z" fill="#1557b0"/><rect x="10" y="14" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/><rect x="10" y="18" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/><rect x="10" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.9"/></svg>
      <span><b>Docs</b></span>
    </div>
    <div class="auth-card">
      <h2>Sign in</h2>
      <p>Use your Docs account</p>
      <div id="auth-err" style="display:none;" class="auth-error"></div>
      <div class="form-group"><label>Gmail address</label><input type="email" id="si-email" placeholder="you@gmail.com" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="si-pw" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"></div>
      <button class="btn-primary" onclick="signIn()">Sign in</button>
      <div class="auth-switch">Don't have an account? <a onclick="showAuth('signup')">Create account</a></div>
    </div>`;
  } else {
    s.innerHTML = `
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4h14l6 6v20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="#4285f4"/><path d="M20 4l6 6h-6V4z" fill="#1557b0"/><rect x="10" y="14" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/><rect x="10" y="18" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9"/><rect x="10" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.9"/></svg>
      <span><b>Docs</b></span>
    </div>
    <div class="auth-card">
      <h2>Create account</h2>
      <p>Join Docs to start writing</p>
      <div id="auth-err" style="display:none;" class="auth-error"></div>
      <div class="form-group"><label>Gmail address</label><input type="email" id="su-email" placeholder="you@gmail.com" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="su-pw" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <div class="form-group"><label>Confirm password</label><input type="password" id="su-pw2" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()"></div>
      <button class="btn-primary" onclick="signUp()">Create account</button>
      <div class="auth-switch">Already have an account? <a onclick="showAuth('signin')">Sign in</a></div>
    </div>`;
  }
}

function authErr(msg) {
  const el = document.getElementById('auth-err');
  if (el) { el.textContent = msg; el.style.display = ''; }
}

function signIn() {
  const email = document.getElementById('si-email').value.trim().toLowerCase();
  const pw = document.getElementById('si-pw').value;
  if (!email || !pw) { authErr('Please fill in all fields.'); return; }
  const users = getUsers();
  const user = users.find(u => u.email === email);
  if (!user || user.password !== pw) { authErr('Incorrect email or password.'); return; }
  loginUser(user);
}

function signUp() {
  const email = document.getElementById('su-email').value.trim().toLowerCase();
  const pw = document.getElementById('su-pw').value;
  const pw2 = document.getElementById('su-pw2').value;
  if (!email || !pw || !pw2) { authErr('Please fill in all fields.'); return; }
  if (!email.includes('@')) { authErr('Please enter a valid email address.'); return; }
  if (pw.length < 6) { authErr('Password must be at least 6 characters.'); return; }
  if (pw !== pw2) { authErr('Passwords do not match.'); return; }
  const users = getUsers();
  if (users.find(u => u.email === email)) { authErr('An account with this email already exists.'); return; }
  const user = { email, password: pw, ip: getMyIP(), createdAt: new Date().toISOString(), isAdmin: email === ADMIN_EMAIL };
  users.push(user);
  saveUsers(users);
  loginUser(user);
}

function loginUser(user) {
  currentUser = user;
  const users = getUsers();
  const idx = users.findIndex(u => u.email === user.email);
  if (idx >= 0) { users[idx].lastActive = new Date().toISOString(); users[idx].status = 'active'; saveUsers(users); currentUser = users[idx]; }
  const sess = getSessions();
  sess[user.email] = { active: true, at: new Date().toISOString() };
  saveSessions(sess);
  showMain();
}

function signOut() {
  if (!currentUser) return;
  const users = getUsers();
  const idx = users.findIndex(u => u.email === currentUser.email);
  if (idx >= 0) { users[idx].status = 'offline'; saveUsers(users); }
  const sess = getSessions();
  if (sess[currentUser.email]) sess[currentUser.email].active = false;
  saveSessions(sess);
  currentUser = null;
  showAuth('signin');
}

function showMain() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = '';
  const email = currentUser.email;
  document.getElementById('topbar-email').textContent = email;
  document.getElementById('topbar-avatar').textContent = email[0].toUpperCase();
  renderNav();
  showHome();
}

function renderNav() {
  const nav = document.getElementById('topbar-nav');
  let html = `<button class="tab${activeTab==='home'?' active':''}" onclick="showHome()"><i class="ti ti-home" aria-hidden="true"></i> Home</button>`;
  if (currentUser && currentUser.isAdmin) {
    html += `<button class="tab${activeTab==='admin'?' active':''}" onclick="showAdmin()"><i class="ti ti-shield-lock" aria-hidden="true"></i> Admin</button>`;
  }
  nav.innerHTML = html;
}

function showHome() {
  activeTab = 'home';
  renderNav();
  document.getElementById('home-screen').style.display = '';
  document.getElementById('editor-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'none';
  renderDocs();
}

function renderDocs(ownerEmail) {
  const email = ownerEmail || currentUser.email;
  const docs = getDocs().filter(d => d.owner === email);
  const grid = document.getElementById('docs-grid');
  if (!grid) return;
  if (docs.length === 0) { grid.innerHTML = '<div class="empty-docs">No documents yet. Create your first one above!</div>'; return; }
  grid.innerHTML = docs.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).map(d => `
    <div class="doc-card" onclick="openDoc('${d.id}')">
      <div class="doc-thumb">${(d.content||'').replace(/<[^>]+>/g,' ').slice(0,200) || '<span style="opacity:0.4">Empty document</span>'}</div>
      <div class="doc-card-label">${escHtml(d.title||'Untitled document')}</div>
      <div class="doc-card-date">${fmtDate(d.updatedAt)}</div>
    </div>`).join('');
}

function newDoc() {
  const doc = { id: 'doc_'+Date.now(), title: 'Untitled document', content: '', owner: currentUser.email, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  const docs = getDocs();
  docs.push(doc);
  saveDocs(docs);
  openDoc(doc.id);
}

function openDoc(id, readOnly) {
  const docs = getDocs();
  const doc = docs.find(d => d.id === id);
  if (!doc) return;
  currentDocId = id;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('editor-screen').style.display = '';
  document.getElementById('doc-title').value = doc.title || '';
  document.getElementById('editor-content').innerHTML = doc.content || '';
  document.getElementById('save-status').textContent = 'All changes saved';
  if (readOnly) {
    document.getElementById('editor-content').setAttribute('contenteditable','false');
    document.getElementById('doc-title').setAttribute('readonly','true');
  } else {
    document.getElementById('editor-content').setAttribute('contenteditable','true');
    document.getElementById('doc-title').removeAttribute('readonly');
  }
}

function backHome() {
  saveDoc();
  currentDocId = null;
  activeTab = 'home';
  showHome();
}

function scheduleDocSave() {
  document.getElementById('save-status').textContent = 'Saving...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveDoc, 800);
}

function saveDoc() {
  if (!currentDocId) return;
  const docs = getDocs();
  const idx = docs.findIndex(d => d.id === currentDocId);
  if (idx < 0) return;
  docs[idx].title = document.getElementById('doc-title').value || 'Untitled document';
  docs[idx].content = document.getElementById('editor-content').innerHTML;
  docs[idx].updatedAt = new Date().toISOString();
  saveDocs(docs);
  document.getElementById('save-status').textContent = 'All changes saved';
}

function execCmd(cmd, val) {
  document.getElementById('editor-content').focus();
  document.execCommand(cmd, false, val || null);
}

function toggleFmt(cmd) {
  execCmd(cmd);
  updateFormatState();
}

function updateFormatState() {
  ['bold','italic','underline'].forEach(cmd => {
    const btn = document.getElementById('btn-'+cmd);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

function sizeToIndex(size) {
  if (size <= 8) return 1;
  if (size <= 10) return 2;
  if (size <= 12) return 3;
  if (size <= 14) return 4;
  if (size <= 18) return 5;
  if (size <= 24) return 6;
  return 7;
}

function showAdmin() {
  if (!currentUser || !currentUser.isAdmin) return;
  activeTab = 'admin';
  renderNav();
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('editor-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = '';
  renderAdminTable();
}

function renderAdminTable() {
  const users = getUsers();
  const el = document.getElementById('admin-user-table');
  if (users.length === 0) { el.innerHTML = '<div class="no-data">No users yet.</div>'; return; }
  el.innerHTML = `
  <table class="user-table" aria-label="User list">
    <thead>
      <tr>
        <th>Gmail</th>
        <th>Password</th>
        <th>Status</th>
        <th>IP Address</th>
        <th>Last active</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      ${users.map(u => `
      <tr>
        <td>${escHtml(u.email)}${u.isAdmin?` <span class="admin-badge">Admin</span>`:''}</td>
        <td class="pw-cell">${escHtml(u.password)}</td>
        <td><span class="status-dot"><span class="dot ${u.status||'offline'}"></span>${u.status==='active'?'Active':'Offline'}</span></td>
        <td style="font-family:var(--font-mono);font-size:12px;">${escHtml(u.ip||'—')}</td>
        <td>${u.lastActive?fmtDate(u.lastActive):'Never'}</td>
        <td>
          <div class="action-btns">
            <button class="btn-sm primary" onclick="adminViewDocs('${escHtml(u.email)}')"><i class="ti ti-file-text" aria-hidden="true"></i> Docs</button>
            <button class="btn-sm" onclick="adminEditUser('${escHtml(u.email)}')"><i class="ti ti-edit" aria-hidden="true"></i> Edit</button>
            ${u.email!==currentUser.email?`<button class="btn-sm danger" onclick="adminDeleteUser('${escHtml(u.email)}')"><i class="ti ti-trash" aria-hidden="true"></i> Delete</button>`:''}
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function adminViewDocs(email) {
  const docs = getDocs().filter(d => d.owner === email);
  showModal(`<h3><i class="ti ti-file-text" aria-hidden="true"></i> Documents for ${escHtml(email)}</h3>
    ${docs.length===0?'<p style="color:var(--color-text-secondary);font-size:14px;">No documents.</p>':
      docs.map(d=>`<div class="doc-list-item">
        <span>${escHtml(d.title||'Untitled')}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn-sm primary" onclick="closeModal();openDoc('${d.id}',true)"><i class="ti ti-eye" aria-hidden="true"></i> View</button>
          <button class="btn-sm" onclick="closeModal();openDoc('${d.id}')"><i class="ti ti-edit" aria-hidden="true"></i> Edit</button>
        </div>
      </div>`).join('')}
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Close</button></div>`);
}

function adminEditUser(email) {
  const users = getUsers();
  const user = users.find(u => u.email === email);
  if (!user) return;
  showModal(`<h3><i class="ti ti-edit" aria-hidden="true"></i> Edit user</h3>
    <div class="form-group"><label>Gmail</label><input type="email" id="edit-email" value="${escHtml(user.email)}"></div>
    <div class="form-group"><label>Password</label><input type="text" id="edit-pw" value="${escHtml(user.password)}"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="saveEditUser('${escHtml(email)}')">Save changes</button>
    </div>`);
}

function saveEditUser(oldEmail) {
  const newEmail = document.getElementById('edit-email').value.trim().toLowerCase();
  const newPw = document.getElementById('edit-pw').value;
  if (!newEmail || !newPw) { alert('Email and password are required.'); return; }
  const users = getUsers();
  const idx = users.findIndex(u => u.email === oldEmail);
  if (idx < 0) return;
  if (newEmail !== oldEmail && users.find(u => u.email === newEmail)) { alert('Email already taken.'); return; }
  users[idx].email = newEmail;
  users[idx].password = newPw;
  saveUsers(users);
  if (newEmail !== oldEmail) {
    const docs = getDocs();
    docs.forEach(d => { if (d.owner === oldEmail) d.owner = newEmail; });
    saveDocs(docs);
  }
  closeModal();
  renderAdminTable();
}

function adminDeleteUser(email) {
  showModal(`<h3 style="color:var(--color-text-danger)"><i class="ti ti-trash" aria-hidden="true"></i> Delete account</h3>
    <p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:12px;">Are you sure you want to delete <b>${escHtml(email)}</b>? This will also delete all their documents. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm danger" onclick="confirmDeleteUser('${escHtml(email)}')">Delete account</button>
    </div>`);
}

function confirmDeleteUser(email) {
  let users = getUsers();
  users = users.filter(u => u.email !== email);
  saveUsers(users);
  let docs = getDocs();
  docs = docs.filter(d => d.owner !== email);
  saveDocs(docs);
  closeModal();
  renderAdminTable();
}

function showModal(html) {
  document.getElementById('modal-container').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso), now = new Date();
  const diff = Math.floor((now-d)/1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60)+'m ago';
  if (diff < 86400) return Math.floor(diff/3600)+'h ago';
  return d.toLocaleDateString();
}

if (!getUsers().find(u => u.email === ADMIN_EMAIL)) {
  const users = getUsers();
  users.push({ email: ADMIN_EMAIL, password: 'admin123', ip: getMyIP(), createdAt: new Date().toISOString(), isAdmin: true, status: 'active', lastActive: new Date().toISOString() });
  saveUsers(users);
}

init();
</script>
